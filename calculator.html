<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <nav>

        <div class="logo">
            Student Grade Calculator
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="calculator.html">Calculator</a></li>
            <li><a href="result.html">Result</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>

</header>

<section class="calculator">

<h2>Student Grade Calculator</h2>

<form id="gradeForm">

<input
type="text"
id="name"
placeholder="Enter Student Name"
required>

<input
type="text"
id="roll"
placeholder="Enter Roll Number"
required>

<input
type="number"
id="sub1"
placeholder="Subject 1 Marks"
min="0"
max="100"
required>

<input
type="number"
id="sub2"
placeholder="Subject 2 Marks"
min="0"
max="100"
required>

<input
type="number"
id="sub3"
placeholder="Subject 3 Marks"
min="0"
max="100"
required>

<input
type="number"
id="sub4"
placeholder="Subject 4 Marks"
min="0"
max="100"
required>

<input
type="number"
id="sub5"
placeholder="Subject 5 Marks"
min="0"
max="100"
required>

<button
type="button"
onclick="calculateGrade()">
Calculate Result
</button>

<button
type="reset">
Clear
</button>

</form>

</section>

<section class="info">

<h3>Grade Scale</h3>

<table>

<tr>
<th>Percentage</th>
<th>Grade</th>
</tr>

<tr>
<td>90 - 100</td>
<td>A+</td>
</tr>

<tr>
<td>80 - 89</td>
<td>A</td>
</tr>

<tr>
<td>70 - 79</td>
<td>B+</td>
</tr>

<tr>
<td>60 - 69</td>
<td>B</td>
</tr>

<tr>
<td>50 - 59</td>
<td>C</td>
</tr>

<tr>
<td>40 - 49</td>
<td>D</td>
</tr>

<tr>
<td>Below 40</td>
<td>F</td>
</tr>

</table>

</section>

<footer>

<p>
© 2026 Student Grade Calculator
</p>

</footer>

<script src="js/script.js"></script>

</body>
</html>
